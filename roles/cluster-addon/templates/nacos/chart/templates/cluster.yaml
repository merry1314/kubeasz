{{  if eq .Values.app.topology "cluster" }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nacos
spec:
  serviceName: nacos-headless
  replicas: {{ .Values.app.replicas }}
  selector:
    matchLabels:
      app: nacos
  template:
    metadata:
      labels:
        app: nacos
      annotations:
        pod.alpha.kubernetes.io/initialized: "true"
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: "app"
                    operator: In
                    values:
                      - nacos
              topologyKey: "kubernetes.io/hostname"
      initContainers:
        - name: init-mysql
          image: {{ .Values.init_container.image }}
          env:
          - name: MYSQL_PWD
            value: {{ .Values.global.mysql.password }}
          - name: DB_USER
            value: {{ .Values.global.mysql.user }}
          - name: DB_HOST
            value: {{ .Values.global.mysql.host }}
          - name: DB_PORT
            value: "{{ .Values.global.mysql.port }}"
          - name: DB_NAME
            value: {{ .Values.mysql.database }}
          command:
          - sh
          - -c
          args:
          - |
            set -o errexit

            echo "等待数据库就绪"
            until mysql -h "$DB_HOST" -P "$DB_PORT" -u "$DB_USER" -e "show databases" > /dev/null; do sleep 5; done

            echo "创建数据库"
            mysql -h "$DB_HOST" -P "$DB_PORT" -u "$DB_USER" -e "create database if not exists $DB_NAME"

            echo "检查是否已初始化"
            mysql -h "$DB_HOST" -P "$DB_PORT" -u "$DB_USER" "$DB_NAME" -e "select count(1) from permissions" && \
            { echo "已初始化，跳过."; exit 0; }

            echo "未初始化，执行初始化脚本..."
            mysql -h "$DB_HOST" -P "$DB_PORT" -u "$DB_USER" "$DB_NAME" < /scripts/init.sql
            echo "初始化成功"
          volumeMounts:
            - name: init-mysql-nacos
              mountPath: /scripts
      containers:
        - name: nacos
          image: {{ .Values.global.imageCredentials.registry }}/{{ .Values.app.repository }}:{{ .Values.app.tag }}
          {{- if .Values.app.resources }}
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
          {{- end }}
          ports:
            - containerPort: 8848
              name: client-port
            - containerPort: 9848
              name: client-rpc
            - containerPort: 9849
              name: raft-rpc
            - containerPort: 7848
              name: old-raft-rpc
          env:
            - name: NACOS_REPLICAS
              value: "{{ .Values.app.replicas }}"
            - name: SERVICE_NAME
              value: "nacos-headless"
            - name: NACOS_AUTH_ENABLE
              value: 'false'
            - name: DOMAIN_NAME
              value: "cluster.local"
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            - name: MYSQL_SERVICE_HOST
              value: {{ .Values.global.mysql.host }}
            - name: MYSQL_SERVICE_DB_NAME
              value: {{ .Values.mysql.database }}
            - name: MYSQL_SERVICE_PORT
              value: "{{ .Values.global.mysql.port }}"
            - name: MYSQL_SERVICE_USER
              value: {{ .Values.global.mysql.user }}
            - name: MYSQL_SERVICE_PASSWORD
              value: {{ .Values.global.mysql.password }}
            - name: SPRING_DATASOURCE_PLATFORM
              value: "mysql"
            - name: NACOS_SERVER_PORT
              value: "8848"
            - name: NACOS_APPLICATION_PORT
              value: "8848"
            - name: PREFER_HOST_MODE
              value: "hostname"
            - name: NACOS_SERVERS
              value: "nacos-0.nacos-headless.{{ .Release.Namespace }}.svc.cluster.local:8848 nacos-1.nacos-headless.{{ .Release.Namespace }}.svc.cluster.local:8848 nacos-2.nacos-headless.{{ .Release.Namespace }}.svc.cluster.local:8848"
      volumes:
      - name: init-mysql-nacos
        configMap:
          name: mysql-nacos-script
{{ end }}
