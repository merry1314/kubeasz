{{- if .Values.ingress.enable }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    ingress.kubernetes.io/proxy-body-size: "0"
  labels:
    app.kubernetes.io/name: nacos
  name: nacos-dashboard
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /nacos
            pathType: Prefix # 可以是Prefix, Exact或ImplementationSpecific
            backend:
              service:
                name: nacos-console
                port:
                  number: 8848
{{- end }}
